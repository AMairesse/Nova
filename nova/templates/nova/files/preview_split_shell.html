{% load i18n %}
<div
  id="split-container"
  class="d-flex flex-row flex-grow-1 position-relative"
  aria-label="{% trans 'Conversation and Preview Split' %}"
  style="min-height: 0;"
>
  <div
    id="chat-pane"
    class="d-flex flex-column flex-grow-1"
    aria-label="{% trans 'Chat pane' %}"
    style="min-width: 240px; width: var(--chat-pane-width, 100%); min-height: 0;"
  >
    <div id="message-container" class="d-flex flex-column flex-grow-1" style="min-height: 0;"></div>
  </div>

  <div
    id="split-resizer"
    class="d-none"
    role="separator"
    aria-label="{% trans 'Resize preview' %}"
    aria-orientation="vertical"
    tabindex="0"
    style="width: 6px; cursor: col-resize; background: repeating-linear-gradient(to bottom, rgba(0,0,0,.05), rgba(0,0,0,.05) 8px, transparent 8px, transparent 16px);"
  ></div>

  <div
    id="preview-pane"
    class="d-none d-flex flex-column flex-grow-1 border-start"
    aria-label="{% trans 'Webapp preview' %}"
    style="min-width: 200px; min-height: 0;"
  >
    <div class="d-flex align-items-center gap-2 px-2 py-1 border-bottom bg-white">
      <button
        class="btn btn-sm btn-outline-secondary"
        id="webapp-refresh-btn"
        type="button"
        title="{% trans 'Refresh preview' %}"
        aria-label="{% trans 'Refresh preview' %}"
      >
        <i class="bi bi-arrow-clockwise"></i>
      </button>
      <a
        class="btn btn-sm btn-outline-primary"
        id="webapp-open-btn"
        href="#"
        target="_blank"
        rel="noopener noreferrer"
        title="{% trans 'Open in new tab' %}"
        aria-label="{% trans 'Open in new tab' %}"
      >
        <i class="bi bi-box-arrow-up-right"></i>
        <span class="d-none d-sm-inline">{% trans "Open" %}</span>
      </a>
      <span class="ms-2 text-muted small text-truncate" id="webapp-slug-label" aria-live="polite"></span>
      <div class="flex-grow-1"></div>
      <button class="btn btn-sm btn-outline-secondary d-lg-none" id="mobile-chat-toggle" type="button" title="{% trans 'Toggle chat' %}">
        <i class="bi bi-chat-dots"></i>
        <span class="d-none d-sm-inline">{% trans "Chat" %}</span>
      </button>
      <button
        class="btn btn-sm btn-outline-secondary"
        id="webapp-close-btn"
        type="button"
        title="{% trans 'Close preview' %}"
        aria-label="{% trans 'Close preview' %}"
      >
        <i class="bi bi-x-lg"></i>
      </button>
    </div>
    <div class="position-relative flex-grow-1" style="min-height: 0;">
      <iframe
        id="webapp-iframe"
        sandbox="allow-scripts allow-same-origin"
        class="w-100 h-100 border-0"
      ></iframe>
      <div
        id="webapp-spinner"
        class="position-absolute top-0 start-0 w-100 h-100 d-none align-items-center justify-content-center bg-white bg-opacity-75"
      >
        <div class="spinner-border" role="status" aria-label="{% trans 'Loading' %}"></div>
      </div>
    </div>
  </div>
</div>
