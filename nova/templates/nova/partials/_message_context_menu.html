{% load i18n %}
<div class="offcanvas offcanvas-bottom" tabindex="-1" id="messageContextMenu" aria-labelledby="messageContextMenuLabel">
  <div class="offcanvas-header py-2 border-bottom">
    <h6 class="offcanvas-title" id="messageContextMenuLabel">{% trans "Message Options" %}</h6>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="{% trans 'Close' %}"></button>
  </div>
  <div class="offcanvas-body">
    <div id="context-menu-context-section" class="context-info-item d-none">
      <span class="context-info-label">{% trans "Context" %}</span>
      <span class="context-info-value" id="context-menu-context-value"></span>
    </div>
    <div id="context-menu-execution-section" class="context-info-item d-none">
      <span class="context-info-label">{% trans "Execution" %}</span>
      <span class="context-info-value" id="context-menu-execution-value"></span>
    </div>
    <div id="context-menu-meta-divider" class="action-sheet-divider d-none"></div>

    <div class="d-grid gap-1">
      <button type="button" class="action-sheet-btn d-none" id="context-menu-execution-details">
        <i class="bi bi-list-check"></i>
        {% trans "Execution details" %}
      </button>
      <button type="button" class="action-sheet-btn d-none" id="context-menu-compact">
        <i class="bi bi-compress"></i>
        {% trans "Compact" %}
      </button>
      <button type="button" class="action-sheet-btn text-danger d-none" id="context-menu-delete-after">
        <i class="bi bi-trash3"></i>
        {% trans "Delete messages after this" %}
      </button>
      <button type="button" class="action-sheet-btn" id="context-menu-copy">
        <i class="bi bi-clipboard"></i>
        {% trans "Copy message" %}
      </button>
    </div>
  </div>
</div>
