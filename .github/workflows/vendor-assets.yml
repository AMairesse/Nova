name: Vendor Assets Check

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  vendor-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check vendorized frontend assets are up to date
        run: |
          ./scripts/check_vendor_assets.sh --strict
